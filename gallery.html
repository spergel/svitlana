<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery – Svitlana Mayboroda</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    main { display: block; }
    .page-title { font-size: 1.3rem; margin: 16px 0 4px; }
  </style>
</head>
<body>
  <div class="page">
    <div id="site-header"></div>

    <h2 class="page-title">Gallery</h2>

    <p class="gallery-intro">
      The images below were produced by collaborators across several years of joint work.
      They illustrate mathematical and physical phenomena central to the research program &mdash;
      wave localization, turbulence, fractal geometry &mdash; and are displayed here as art
      as much as science.
    </p>

    <div class="gallery-grid">

      <div class="gallery-item">
        <figure>
          <img src="images/cassiopeia-a.png" alt="Cassiopeia A supernova remnant imaged by the James Webb Space Telescope">
          <figcaption>
            <div class="gallery-author">Cassiopeia A</div>
            <div>Supernova remnant imaged by the James Webb Space Telescope (NIRCam + MIRI composite).
              An astrophysical illustration of wave phenomena and disordered structure at astronomical scale.</div>
            <div class="gallery-paper">
              Image credit: NASA, ESA, CSA, STScI, D. Milisavljevic (Purdue), T. Temim (Princeton), I. De Looze (UGent).
              Via <a href="https://universe-of-learning.org/informal-educators/science-resources/cassiopeia-a-resources"
                target="_blank" rel="noopener noreferrer">Universe of Learning</a>.
            </div>
          </figcaption>
        </figure>
      </div>

      <div class="gallery-item">
        <figure>
          <img src="images/filoche-waves.png" alt="Localization landscape showing five concentration peaks with Voronoi partition">
          <figcaption>
            <div class="gallery-author">Marcel Filoche</div>
            <div>Localization landscape for a disordered quantum system, showing five concentration peaks
              and the Voronoi-like partition they induce. Produced by Marcel Filoche (&#201;cole Polytechnique).</div>
            <div class="gallery-paper">
              From: M. Filoche &amp; S. Mayboroda,
              <a href="https://www.pnas.org/doi/10.1073/pnas.1120432109"
                target="_blank" rel="noopener noreferrer">
                Universal mechanism for Anderson and weak localization,
                <em>PNAS</em> (2012)
              </a>.
            </div>
          </figcaption>
        </figure>
      </div>

      <div class="gallery-item">
        <figure>
          <img src="images/fielding-turbulence.png" alt="Turbulence simulation showing mixing and interface instability">
          <figcaption>
            <div class="gallery-author">Drummond Fielding</div>
            <div>Turbulence simulation showing the complex interface structure and mixing dynamics
              arising in a disordered fluid medium. Produced by Drummond Fielding (Flatiron Institute).</div>
            <div class="gallery-paper">
              Preprint in preparation. Image used with permission.
            </div>
          </figcaption>
        </figure>
      </div>

      <div class="gallery-item">
        <figure>
          <img src="images/david-cantor.png" alt="Field lines and Cantor-set-like boundary structure in a planar domain">
          <figcaption>
            <div class="gallery-author">Guy David</div>
            <div>Field lines in a domain whose boundary exhibits a Cantor-set-like structure,
              illustrating elliptic theory in domains with lower-dimensional boundaries.
              Produced by Guy David (Universit&#233; Paris-Saclay).</div>
            <div class="gallery-paper">
              From: G. David, J. Feneuil &amp; S. Mayboroda,
              <a href="https://arxiv.org/abs/2007.01745"
                target="_blank" rel="noopener noreferrer">
                Elliptic theory in domains with boundaries of mixed dimension,
                <em>Ast&#233;risque</em> (2023)
              </a>.
            </div>
          </figcaption>
        </figure>
      </div>

    </div>

    <div id="site-footer"></div>
  </div>

  <script src="components.js"></script>
</body>
</html>
